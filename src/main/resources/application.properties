# Server (Render sets PORT dynamically)
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# Database — local MySQL defaults; override on Render via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expensetracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YOUR_MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:your-secret-key}

# CORS — production frontend origin (e.g. https://deeprajsawaiyan.github.io)
frontend.url=${FRONTEND_URL:}
